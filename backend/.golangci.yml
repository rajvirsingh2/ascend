linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - noctx
    - exhaustive

linters-settings:
  goimports:
    local-prefixes: ascend-backend

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck