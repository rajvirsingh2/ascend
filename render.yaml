services:

  # ── API Server ────────────────────────────────────────────────────────────
  - type: web
    name: ascend-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore
    plan: starter
    numInstances: 1
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_PORT
        value: "8080"
      - key: ALLOWED_ORIGINS
        value: "https://ascend.app"
      - fromGroup: ascend-shared

  # ── XP Worker ─────────────────────────────────────────────────────────────
  - type: worker
    name: ascend-xp-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.worker
    dockerContext: ./backend
    region: singapore
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: WORKER_TYPE
        value: xp
      - fromGroup: ascend-shared

  # ── Outbox Relay Worker ───────────────────────────────────────────────────
  - type: worker
    name: ascend-outbox-relay
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.worker
    dockerContext: ./backend
    region: singapore
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: WORKER_TYPE
        value: outbox
      - fromGroup: ascend-shared

  # ── RAG Service ───────────────────────────────────────────────────────────
  - type: web
    name: ascend-rag
    runtime: docker
    dockerfilePath: ./rag-service/Dockerfile
    dockerContext: ./rag-service
    region: singapore
    plan: starter
    numInstances: 1
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - fromGroup: ascend-shared

# ── Shared env-var group definition ──────────────────────────────────────────
# Render will create this group automatically from the Blueprint.
# Sync: false means values must be set manually in the Render Dashboard
# (never commit real secrets to this file).
envVarGroups:
  - name: ascend-shared
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRY_DAYS
        value: "7"
      - key: OPENAI_API_KEY
        sync: false
      - key: KAFKA_BROKERS
        sync: false
      - key: RAG_SERVICE_URL
        sync: false
